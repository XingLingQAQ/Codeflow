  # ==================== Workspace (experimental) ====================
  /api/v1/workspace/list:
    get:
      tags: [Workspace]
      summary: List directory under project root
      x-codeflow-experimental: true
      parameters:
        - name: root
          in: query
          required: true
          schema:
            type: string
        - name: path
          in: query
          schema:
            type: string
        - name: X-Codeflow-Workspace-Root
          in: header
          schema:
            type: string
      responses:
        '200':
          description: Directory entries

  /api/v1/workspace/read:
    get:
      tags: [Workspace]
      summary: Read file under project root
      x-codeflow-experimental: true
      parameters:
        - name: root
          in: query
          required: true
          schema:
            type: string
        - name: path
          in: query
          required: true
          schema:
            type: string
        - name: staged
          in: query
          description: When true, read from .codeflow/staging instead of the project tree
          schema:
            type: string
            enum: [true, false, '1', '0']
      responses:
        '200':
          description: File content (text + base64)

  /api/v1/workspace/stat:
    get:
      tags: [Workspace]
      summary: Stat file or directory under project root
      x-codeflow-experimental: true
      parameters:
        - name: root
          in: query
          required: true
          schema:
            type: string
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Entry metadata
        '404':
          description: Not found

  /api/v1/workspace/staged:
    get:
      tags: [Workspace]
      summary: List files in shadow staging (.codeflow/staging)
      x-codeflow-experimental: true
      parameters:
        - name: root
          in: query
          required: true
          schema:
            type: string
        - name: X-Codeflow-Workspace-Root
          in: header
          schema:
            type: string
      responses:
        '200':
          description: Staged file entries (paths relative to project tree)

  /api/v1/workspace/promote:
    post:
      tags: [Workspace]
      summary: Promote staged file into project tree
      x-codeflow-experimental: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                root: { type: string }
                path: { type: string }
      responses:
        '200':
          description: Promoted entry
        '403':
          description: Blocked by guard

  /api/v1/workspace/promote-all:
    post:
      tags: [Workspace]
      summary: Promote all staged files into the project tree
      x-codeflow-experimental: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                root: { type: string }
      responses:
        '200':
          description: Promoted entries (may include partial error)
        '403':
          description: Blocked by guard

  /api/v1/workspace/discard:
    post:
      tags: [Workspace]
      summary: Discard a staged file without promoting
      x-codeflow-experimental: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                root: { type: string }
                path: { type: string }
      responses:
        '200':
          description: Discarded
        '404':
          description: Staged file not found

  /api/v1/workspace/discard-all:
    post:
      tags: [Workspace]
      summary: Discard all staged files
      x-codeflow-experimental: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                root: { type: string }
      responses:
        '200':
          description: Discard count

  /api/v1/workspace/write:
    post:
      tags: [Workspace]
      summary: Write file (guarded)
      x-codeflow-experimental: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceWriteRequest'
      responses:
        '200':
          description: Written entry
        '403':
          description: Blocked by guard

  # ==================== Skills (experimental) ====================
  /api/v1/skills:
    get:
      tags: [Skills]
      summary: List skills
      x-codeflow-experimental: true
      parameters:
        - name: stage
          in: query
          description: Optional stage type filter (empty stage_tags match any)
          schema:
            type: string
        - name: enabled
          in: query
          description: When true, only enabled skills are returned
          schema:
            type: string
            enum: [true, false]
      responses:
        '200':
          description: Skill list
    post:
      tags: [Skills]
      summary: Create skill
      x-codeflow-experimental: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSkillRequest'
      responses:
        '201':
          description: Skill created

  /api/v1/skills/import:
    post:
      tags: [Skills]
      summary: Import markdown skills from a directory
      x-codeflow-experimental: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportSkillsRequest'
      responses:
        '200':
          description: Import count
        '400':
          description: Invalid directory
        '503':
          description: Registry does not support import

  /api/v1/skills/export:
    get:
      tags: [Skills]
      summary: Export all skills as concatenated markdown with frontmatter
      x-codeflow-experimental: true
      responses:
        '200':
          description: Markdown dump

  /api/v1/skills/match:
    post:
      tags: [Skills]
      summary: Match skills by text/stage
      x-codeflow-experimental: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatchSkillRequest'
      responses:
        '200':
          description: Match results

  /api/v1/skills/inject:
    post:
      tags: [Skills]
      summary: Render matched skills as prompt injection
      x-codeflow-experimental: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatchSkillRequest'
      responses:
        '200':
          description: Injection markdown

  /api/v1/skills/{id}:
    get:
      tags: [Skills]
      summary: Get skill
      x-codeflow-experimental: true
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Skill
        '404':
          description: Not found
    patch:
      tags: [Skills]
      summary: Update skill
      x-codeflow-experimental: true
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated skill
        '404':
          description: Skill not found
        '409':
          description: Builtin skill cannot be updated
    delete:
      tags: [Skills]
      summary: Delete skill
      x-codeflow-experimental: true
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
        '404':
          description: Skill not found
        '409':
          description: Builtin skill cannot be deleted

  # ==================== Guard (experimental) ====================
  /api/v1/guard/config:
    get:
      tags: [Guard]
      summary: Get active guard policy configuration
      x-codeflow-experimental: true
      responses:
        '200':
          description: Config snapshot
        '503':
          description: Guard engine unavailable

  /api/v1/guard/rules:
    get:
      tags: [Guard]
      summary: List guard rule ids and severities
      x-codeflow-experimental: true
      responses:
        '200':
          description: Rule list with denied globs and max bytes
        '503':
          description: Guard engine unavailable

  /api/v1/guard/check:
    post:
      tags: [Guard]
      summary: Dry-run write policy evaluation
      x-codeflow-experimental: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path: { type: string }
                root: { type: string }
                abs_path: { type: string }
                content_text: { type: string }
                content_base64: { type: string }
      responses:
        '200':
          description: Decision with violations

  /api/v1/guard/index:
    post:
      tags: [Guard]
      summary: Seed AST symbol index from project tree
      x-codeflow-experimental: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [root]
              properties:
                root: { type: string }
      responses:
        '200':
          description: Indexed file count

  /api/v1/guard/exempt:
    post:
      tags: [Guard]
      summary: Grant temporary path exemption for selected rules
      x-codeflow-experimental: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuardExemptRequest'
      responses:
        '200':
          description: Exemption granted
        '503':
          description: Guard engine unavailable
    delete:
      tags: [Guard]
      summary: Clear a path exemption
      x-codeflow-experimental: true
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cleared
        '400':
          description: Missing path
        '503':
          description: Guard engine unavailable

  /api/v1/guard/exemptions:
    get:
      tags: [Guard]
      summary: List active (non-expired) path exemptions
      x-codeflow-experimental: true
      responses:
        '200':
          description: Exemption list
        '503':
          description: Guard engine unavailable

components:
  schemas:
    Response:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
        error:
          type: string

    HealthResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            status:
              type: string
            version:
              type: string

    MemoryItem:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [stm, ltm]
        status:
          type: string
          enum: [active, archived, pending_archive, pending_delete]
        session_id:
          type: string
        message_index:
          type: integer
        timestamp:
          type: integer
        heat:
          type: number
        surprise:
          type: number
        tags:
          type: array
          items:
            type: string
        source:
          type: string
          enum: [user, assistant, system]
        is_permanent:
          type: boolean
        archived_at:
          type: integer

    MemoryListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MemoryItem'
        total:
          type: integer
        has_more:
          type: boolean
        next_offset:
          type: integer

    MemoryCreateRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
        type:
          type: string
          enum: [stm, ltm]
        session_id:
          type: string
        source:
          type: string
          enum: [user, assistant, system]
        tags:
          type: array
          items:
            type: string
        is_permanent:
          type: boolean

    MemoryUpdateRequest:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
        is_permanent:
          type: boolean

    MemoryListEnvelope:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/MemoryListResponse'
        error:
          type: string

    MemoryItemEnvelope:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/MemoryItem'
        error:
          type: string

    MemoryDeleteResponse:
      type: object
      properties:
        deleted:
          type: boolean
        id:
          type: string

    MemoryDeleteEnvelope:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/MemoryDeleteResponse'
        error:
          type: string

    VectorSearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        limit:
          type: integer
          default: 10
        threshold:
          type: number

    FulltextSearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        highlight:
          type: boolean
        limit:
          type: integer

    GraphSearchRequest:
      type: object
      properties:
        subject:
          type: string
        predicate:
          type: string
        object:
          type: string
        limit:
          type: integer

    HybridSearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        vector_weight:
          type: number
        fulltext_weight:
          type: number
        graph_weight:
          type: number
        limit:
          type: integer

    SearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
        total:
          type: integer

    GraphSearchResponse:
      type: object
      properties:
        triples:
          type: array
          items:
            type: object
            properties:
              subject:
                type: string
              predicate:
                type: string
              object:
                type: string
              score:
                type: number

    FileTreeResponse:
      type: object
      properties:
        root:
          $ref: '#/components/schemas/FileNode'

    FileNode:
      type: object
      properties:
        name:
          type: string
        path:
          type: string
        is_dir:
          type: boolean
        children:
          type: array
          items:
            $ref: '#/components/schemas/FileNode'

    ASTRequest:
      type: object
      required: [file_path]
      properties:
        file_path:
          type: string
        language:
          type: string

    ASTResponse:
      type: object
      properties:
        symbols:
          type: array
          items:
            $ref: '#/components/schemas/ASTSymbol'

    ASTSymbol:
      type: object
      properties:
        name:
          type: string
        kind:
          type: string
        start_line:
          type: integer
        end_line:
          type: integer

    TokenRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
        model:
          type: string

    TokenResponse:
      type: object
      properties:
        count:
          type: integer

    PresetCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        files:
          type: array
          items:
            type: string
        patterns:
          type: array
          items:
            type: string

    AgentListResponse:
      type: object
      properties:
        agents:
          type: array
          items:
            $ref: '#/components/schemas/Agent'

    Agent:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        model:
          type: string
        started_at:
          type: integer

    AgentLogsResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: '#/components/schemas/LogEntry'

    LogEntry:
      type: object
      properties:
        timestamp:
          type: integer
        level:
          type: string
        message:
          type: string

    CallTraceResponse:
      type: object
      properties:
        trace:
          type: array
          items:
            $ref: '#/components/schemas/CallNode'

    CallNode:
      type: object
      properties:
        id:
          type: string
        parent_id:
          type: string
        agent_id:
          type: string
        action:
          type: string
        started_at:
          type: integer
        ended_at:
          type: integer

    EntryListResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/Entry'
        total:
          type: integer

    Entry:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [state, proposal, decision, artifact]
        content:
          type: string
        author:
          type: string
        version:
          type: integer
        created_at:
          type: integer
        updated_at:
          type: integer

    EntryCreateRequest:
      type: object
      required: [type, content]
      properties:
        type:
          type: string
          enum: [state, proposal, decision, artifact]
        content:
          type: string
        author:
          type: string

    EntryUpdateRequest:
      type: object
      properties:
        content:
          type: string

    VoteCreateRequest:
      type: object
      required: [entry_id, title, options]
      properties:
        entry_id:
          type: string
        title:
          type: string
        options:
          type: array
          items:
            type: string
        threshold:
          type: number
        expires_in:
          type: integer

    VoteResponse:
      type: object
      properties:
        id:
          type: string
        entry_id:
          type: string
        title:
          type: string
        status:
          type: string
        votes:
          type: object
        consensus_reached:
          type: boolean

    VoteCastRequest:
      type: object
      required: [voter, option]
      properties:
        voter:
          type: string
        option:
          type: string

    DebateCreateRequest:
      type: object
      required: [title, topic]
      properties:
        title:
          type: string
        topic:
          type: string
        max_rounds:
          type: integer

    Debate:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        topic:
          type: string
        status:
          type: string
        current_round:
          type: integer
        conflicts:
          type: array
          items:
            $ref: '#/components/schemas/Conflict'
        solutions:
          type: array
          items:
            $ref: '#/components/schemas/Solution'

    Conflict:
