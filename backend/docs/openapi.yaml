openapi: 3.0.3
info:
  title: CodeFlow Backend API
  description: |
    CodeFlow Backend API provides endpoints for memory management, search, context analysis,
    agent management, blackboard collaboration, debate system, and task planning.
  version: 0.1.0
  contact:
    name: CodeFlow Team
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Health
    description: Health check endpoints
  - name: Memory
    description: STM/LTM memory management
  - name: MemoryPreflight
    description: Progressive memory disclosure with semantic preflight
  - name: Search
    description: Vector, fulltext, graph, and hybrid search
  - name: Context
    description: File tree, AST parsing, and token calculation
  - name: Agents
    description: Agent management and monitoring
  - name: Conversations
    description: Conversation management and streaming
  - name: Blackboard
    description: Multi-agent collaboration blackboard
  - name: Votes
    description: BFT consensus voting
  - name: Debates
    description: Generator/Critic debate system
  - name: Plans
    description: Task planning and management
  - name: Snapshots
    description: Atomic snapshot creation, restoration, and management
  - name: Config
    description: Multi-level configuration (Global/Session/Role)
  - name: PAPI
    description: PAPI variable routing and hot-swap
  - name: Hooks
    description: Lifecycle hook management
  - name: Summarize
    description: Conversation summarization and context compression
  - name: Audit
    description: Immutable audit logging with hash chain verification
  - name: Privacy
    description: Privacy-aware encryption, decryption, and PII redaction
  - name: Isolation
    description: Multi-agent permission isolation and RBAC
  - name: SAMG
    description: Semantic memory graph with spreading activation and decay
  - name: Flows
    description: Flow engine (experimental) — stage state machine
  - name: Workspace
    description: Project-root filesystem (experimental) — list/read/write via guard
  - name: Skills
    description: Skill registry (experimental) — match and prompt injection
  - name: Guard
    description: Write policy guard (experimental) — dry-run check and AST index

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/memory/items:
    get:
      tags: [Memory]
      summary: List memory items
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [stm, ltm]
        - name: session_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived, pending_archive, pending_delete]
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [timestamp, heat, surprise]
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of memory items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryListEnvelope'
    post:
      tags: [Memory]
      summary: Create memory item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryCreateRequest'
      responses:
        '201':
          description: Memory item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryItemEnvelope'

  /api/v1/memory/items/{id}:
    patch:
      tags: [Memory]
      summary: Update memory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryUpdateRequest'
      responses:
        '200':
          description: Memory item updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryItemEnvelope'
    delete:
      tags: [Memory]
      summary: Delete memory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Memory item deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryDeleteEnvelope'

  /api/v1/memory/items/{id}/archive:
    post:
      tags: [Memory]
      summary: Archive memory item (STM to LTM)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Memory item archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryItemEnvelope'

  /api/v1/memory/items/{id}/restore:
    post:
      tags: [Memory]
      summary: Restore memory item (LTM to STM)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Memory item restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryItemEnvelope'

  /api/v1/search/vector:
    post:
      tags: [Search]
      summary: Vector similarity search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VectorSearchRequest'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'

  /api/v1/search/fulltext:
    post:
      tags: [Search]
      summary: Full-text search with highlighting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FulltextSearchRequest'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'

  /api/v1/search/graph:
    post:
      tags: [Search]
      summary: Graph/triple search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphSearchRequest'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphSearchResponse'

  /api/v1/search/hybrid:
    post:
      tags: [Search]
      summary: Hybrid search combining vector, fulltext, and graph
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HybridSearchRequest'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'

  /api/v1/context/files:
    get:
      tags: [Context]
      summary: Get file tree
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
        - name: max_depth
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: File tree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileTreeResponse'

  /api/v1/context/ast:
    post:
      tags: [Context]
      summary: Parse AST from file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ASTRequest'
      responses:
        '200':
          description: AST nodes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ASTResponse'

  /api/v1/context/tokens:
    post:
      tags: [Context]
      summary: Calculate token count
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: Token count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /api/v1/context/presets:
    get:
      tags: [Context]
      summary: List context presets
      responses:
        '200':
          description: List of presets
    post:
      tags: [Context]
      summary: Create context preset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresetCreateRequest'
      responses:
        '201':
          description: Preset created

  /api/v1/context/presets/{id}:
    delete:
      tags: [Context]
      summary: Delete context preset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Preset deleted

  /api/v1/agents:
    get:
      tags: [Agents]
      summary: List active agents
      responses:
        '200':
          description: List of agents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentListResponse'

  /api/v1/agents/{id}/logs:
    get:
      tags: [Agents]
      summary: Get agent logs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Agent logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentLogsResponse'

  /api/v1/conversations/{sessionId}/trace:
    get:
      tags: [Conversations]
      summary: Get conversation call trace
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Call trace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallTraceResponse'

  /api/v1/conversations/{sessionId}/stop:
    post:
      tags: [Conversations]
      summary: Stop conversation
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Conversation stopped

  /api/v1/conversations/{sessionId}/retry:
    post:
      tags: [Conversations]
      summary: Retry conversation
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Conversation retried

  /api/v1/conversations/{sessionId}/stream:
    get:
      tags: [Conversations]
      summary: WebSocket stream for conversation
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '101':
          description: WebSocket upgrade

  /api/v1/blackboard/entries:
    get:
      tags: [Blackboard]
      summary: List blackboard entries
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [state, proposal, decision, artifact]
        - name: author
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntryListResponse'
    post:
      tags: [Blackboard]
      summary: Create blackboard entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntryCreateRequest'
      responses:
        '201':
          description: Entry created

  /api/v1/blackboard/entries/{id}:
    patch:
      tags: [Blackboard]
      summary: Update blackboard entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntryUpdateRequest'
      responses:
        '200':
          description: Entry updated
    delete:
      tags: [Blackboard]
      summary: Delete blackboard entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Entry deleted

  /api/v1/votes:
    post:
      tags: [Votes]
      summary: Create vote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoteCreateRequest'
      responses:
        '201':
          description: Vote created

  /api/v1/votes/{id}:
    get:
      tags: [Votes]
      summary: Get vote status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Vote status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoteResponse'

  /api/v1/votes/{id}/cast:
    post:
      tags: [Votes]
      summary: Cast vote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoteCastRequest'
      responses:
        '200':
          description: Vote cast

  /api/v1/debates:
    get:
      tags: [Debates]
      summary: List debates
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: flow_id
          in: query
          schema:
            type: string
        - name: stage_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Debate list (supports flow_id/stage_id filter)
    post:
      tags: [Debates]
      summary: Create debate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DebateCreateRequest'
      responses:
        '201':
          description: Debate created

  /api/v1/debates/{id}:
    get:
      tags: [Debates]
      summary: Get debate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Debate details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Debate'

  /api/v1/debates/{id}/next-round:
    post:
      tags: [Debates]
      summary: Advance to next debate round
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NextRoundRequest'
      responses:
        '200':
          description: Round advanced

  /api/v1/debates/{id}/conflicts/{cid}/resolve:
    post:
      tags: [Debates]
      summary: Resolve conflict
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: cid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveConflictRequest'
      responses:
        '200':
          description: Conflict resolved

  /api/v1/debates/{id}/select-solution:
    post:
      tags: [Debates]
      summary: Select solution and resolve debate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectSolutionRequest'
      responses:
        '200':
          description: Solution selected

  /api/v1/debates/{id}/export:
    get:
      tags: [Debates]
      summary: Export debate audit report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            enum: [json, markdown]
            default: json
      responses:
        '200':
          description: Audit report

  /api/v1/debates/{id}/stream:
    get:
      tags: [Debates]
      summary: WebSocket stream for debate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '101':
          description: WebSocket upgrade

  /api/v1/plans:
    get:
      tags: [Plans]
      summary: List plans
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, completed, archived]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of plans
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanListResponse'
    post:
      tags: [Plans]
      summary: Create plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanCreateRequest'
      responses:
        '201':
          description: Plan created

  /api/v1/plans/{id}/tasks:
    get:
      tags: [Plans]
      summary: List tasks in plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [order, priority, created_at]
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
    post:
      tags: [Plans]
      summary: Create task in plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreateRequest'
      responses:
        '201':
          description: Task created

  /api/v1/plans/{id}/tasks/{tid}:
    patch:
      tags: [Plans]
      summary: Update task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: tid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdateRequest'
      responses:
        '200':
          description: Task updated
    delete:
      tags: [Plans]
      summary: Delete task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: tid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task deleted

  /api/v1/plans/{id}/tasks/{tid}/reorder:
    post:
      tags: [Plans]
      summary: Reorder task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: tid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskReorderRequest'
      responses:
        '200':
          description: Task reordered

  /api/v1/plans/{id}/tasks/batch-model:
    post:
      tags: [Plans]
      summary: Batch update task models
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchModelRequest'
      responses:
        '200':
          description: Models updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchModelResponse'

  # ==================== Snapshots ====================
  /api/v1/snapshots:
    post:
      tags: [Snapshots]
      summary: Create atomic snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SnapshotCreateRequest'
      responses:
        '201':
          description: Snapshot created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Snapshot'
    get:
      tags: [Snapshots]
      summary: List snapshots
      parameters:
        - name: session_id
          in: query
          schema:
            type: string
        - name: start_time
          in: query
          description: RFC3339 timestamp
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          description: RFC3339 timestamp
          schema:
            type: string
            format: date-time
        - name: tags
          in: query
          description: Repeat the query parameter to filter by multiple tags
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of snapshots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotListResponse'
  /api/v1/samg/extract-with-pointers:
    post:
      tags: [SAMG]
      summary: Extract triples from text and attach raw archive pointers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtractWithPointersRequest'
      responses:
        '200':
          description: Extracted triples with pointers attached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtractResponseEnvelope'

  /api/v1/samg/query-memory:
    post:
      tags: [SAMG]
      summary: Query memory via SAMG neural index
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryMemoryRequest'
      responses:
        '200':
          description: Memory query results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryMemoryEnvelope'

  /api/v1/samg/nodes/{id}/pointers:
    get:
      tags: [SAMG]
      summary: Get pointers bound to a node
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Node pointers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodePointersEnvelope'
    post:
      tags: [SAMG]
      summary: Add a pointer to a node
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddNodePointerRequest'
      responses:
        '201':
          description: Pointer added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericMessageEnvelope'

  /api/v1/snapshots/{id}:
    get:
      tags: [Snapshots]
      summary: Get snapshot details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Snapshot details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Snapshot'
    delete:
      tags: [Snapshots]
      summary: Delete snapshot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Snapshot deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotDeleteResponse'

  /api/v1/snapshots/{id}/restore:
    post:
      tags: [Snapshots]
      summary: Restore snapshot (full-stack rollback)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Snapshot restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestoreResult'

  # ==================== Memory Atomic ====================
  /api/v1/memory/atomic:
    post:
      tags: [Memory]
      summary: Create atomic memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
