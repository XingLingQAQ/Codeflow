        dir:
          type: string
          description: Absolute directory containing .md skill files

    GuardExemptRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
        rules:
          type: array
          items:
            type: string
          description: Rule ids to exempt; empty may mean all (engine-defined)
        reason:
          type: string
        ttl_seconds:
          type: integer
          description: Seconds until expiry; default 3600 when omitted or non-positive

    CreateSkillRequest:
      type: object
      required: [name, body]
      properties:
        name:
          type: string
        description:
          type: string
        version:
          type: string
        body:
          type: string
        triggers:
          type: array
          items:
            type: string
        stage_tags:
          type: array
          items:
            type: string
        source:
          type: string

    MatchSkillRequest:
      type: object
      properties:
        text:
          type: string
        stage_type:
          type: string
        limit:
          type: integer

