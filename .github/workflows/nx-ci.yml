name: Nx CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  nx-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Repo Hygiene Guard
        run: node scripts/check-repo-hygiene.mjs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Install Root Dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Workbench App Package
        run: pnpm --filter @codeflow/workbench exec node -e "console.log('workbench package ready')"

      - name: Nx Build (all TS projects)
        run: pnpm exec nx run-many -t build --exclude=backend

      - name: Nx Typecheck
        run: pnpm exec nx run-many -t typecheck --exclude=backend
        continue-on-error: true

      - name: Nx Lint
        run: pnpm exec nx run-many -t lint --exclude=backend
        continue-on-error: true

      - name: API Contract Check
        run: pnpm run check:api-contracts

      - name: Backend Experimental Routes Check
        run: pnpm run check:backend-routes

      - name: Generated API Types Check
        run: pnpm run check:api-types

      - name: Frontend Coverage
        run: pnpm run test:coverage

      - name: Upload Frontend Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/
          if-no-files-found: warn

  nx-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Setup GCC (for CGO)
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Backend Lint
        working-directory: backend
        run: |
          if command -v golangci-lint >/dev/null 2>&1; then
            golangci-lint run ./...
          else
            echo "golangci-lint not installed, skipping"
          fi
        continue-on-error: true

      - name: Backend Experimental Routes Check
        run: node scripts/check-backend-routes.mjs

      - name: Backend Test (CGO=1)
        working-directory: backend
        env:
          CGO_ENABLED: "1"
        run: go test -race -coverprofile=coverage.out ./...

      - name: Backend Coverage Report
        if: always()
        working-directory: backend
        run: |
          if [ -f coverage.out ]; then
            go tool cover -html=coverage.out -o coverage.html
            go tool cover -func=coverage.out > coverage.txt
          else
            echo "coverage.out not found; backend tests likely failed before coverage was written" > coverage.txt
          fi

      - name: Upload Backend Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/coverage.out
            backend/coverage.html
            backend/coverage.txt
          if-no-files-found: warn

      - name: Backend Build
        working-directory: backend
        run: |
          mkdir -p build
          CGO_ENABLED=1 go build -v -ldflags "-s -w" -o build/codeflow-server ./cmd/codeflow-server
